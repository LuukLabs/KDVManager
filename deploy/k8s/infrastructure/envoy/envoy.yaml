admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 8001

stats_config:
  stats_tags:
    - tag_name: cluster_name
      regex: "^cluster\\.((.+?)\\.).*"
    - tag_name: virtual_host_name
      regex: "^vhost\\.((.+?)\\.).*"
    - tag_name: listener_address
      regex: "^listener\\.((.+?)\\.).*"
    - tag_name: http_conn_manager_prefix
      regex: "^http\\.((.+?)\\.).*"

static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          request_id_extension:
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.request_id.uuid.v3.UuidRequestIdConfig
              use_request_id_for_trace_sampling: true
          generate_request_id: true
          preserve_external_request_id: true
          tracing:
            provider:
              name: envoy.tracers.opentelemetry
              typed_config:
                "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
                grpc_service:
                  envoy_grpc:
                    cluster_name: otel-collector
                  timeout: 0.25s
                service_name: envoy
          stat_prefix: ingress_http
          # Minimal structured access log: gateway visibility that survives
          # otel-collector outages (tracing has a 0.25s export timeout).
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
              log_format:
                json_format:
                  timestamp: "%START_TIME%"
                  method: "%REQ(:METHOD)%"
                  path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                  response_code: "%RESPONSE_CODE%"
                  duration: "%DURATION%"
                  upstream_cluster: "%UPSTREAM_CLUSTER%"
                  request_id: "%REQ(X-REQUEST-ID)%"
                  user_agent: "%REQ(USER-AGENT)%"
          upgrade_configs:
          - upgrade_type: websocket
          route_config:
            name: kdvmanager_backend_route
            virtual_hosts:
            - name: kdvmanager_backend
              domains:
              - "*"
              typed_per_filter_config:
                envoy.filters.http.cors:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                  allow_origin_string_match:
                  - safe_regex:
                      regex: ".*"
                  allow_headers: content-type,authorization,traceparent,tracestate
                  allow_methods: GET, POST, PUT, HEAD, OPTIONS, DELETE
                  expose_headers: x-Total
              routes:
              - name: "crm"
                match:
                  prefix: /crm/
                route:
                  prefix_rewrite: /
                  cluster: crm-api
              - name: "scheduling"
                match:
                  prefix: /scheduling/
                route:
                  prefix_rewrite: /
                  cluster: scheduling-api
              - name: "platformmanagement"
                match:
                  prefix: /platformmanagement/
                route:
                  prefix_rewrite: /
                  cluster: platformmanagement-api
              # Browser telemetry ingest: the web app posts OTLP/HTTP payloads
              # to /telemetry/v1/traces, forwarded to the OTel collector.
              - name: "telemetry"
                match:
                  prefix: /telemetry/
                route:
                  prefix_rewrite: /
                  cluster: otel-collector-http
                # Bounds the unauthenticated telemetry ingest per Envoy pod (60 burst / 30 rps).
                typed_per_filter_config:
                  envoy.filters.http.local_ratelimit:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                    stat_prefix: telemetry_rate_limiter
                    token_bucket:
                      max_tokens: 60
                      tokens_per_fill: 30
                      fill_interval: 1s
                    filter_enabled:
                      runtime_key: telemetry_rate_limit_enabled
                      default_value:
                        numerator: 100
                        denominator: HUNDRED
                    filter_enforced:
                      runtime_key: telemetry_rate_limit_enforced
                      default_value:
                        numerator: 100
                        denominator: HUNDRED
                    status:
                      code: TooManyRequests
          http_filters:
          - name: envoy.filters.http.cors
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
          # No-op at the listener level (no token_bucket): rate limiting only
          # applies where a route sets typed_per_filter_config (telemetry).
          - name: envoy.filters.http.local_ratelimit
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
              stat_prefix: http_local_rate_limiter
          - name: envoy.filters.http.jwt_authn
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
              providers:
                auth0_provider:
                  issuer: https://kdvmanager.eu.auth0.com/
                  audiences:
                  - https://api.kdvmanager.nl
                  - https://kdvmanager.eu.auth0.com/userinfo
                  remote_jwks:
                    http_uri:
                      uri: https://kdvmanager.eu.auth0.com/.well-known/jwks.json
                      cluster: kdvmanager.eu.auth0.com|443
                      timeout: 5s
                    cache_duration: 300s
                  from_headers:
                  - name: Authorization
                    value_prefix: "Bearer "
                  forward: true
                  payload_in_metadata: jwt_payload
                  require_expiration: true
              rules:
              # Telemetry ingest is unauthenticated: browser sessions have no
              # token before login and errors must be reportable regardless.
              - match:
                  prefix: /telemetry/
              - match:
                  prefix: /crm/
                requires:
                  provider_name: auth0_provider
              - match:
                  prefix: /scheduling/
                requires:
                  provider_name: auth0_provider
              - match:
                  prefix: /platformmanagement/
                requires:
                  provider_name: auth0_provider
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
  - name: kdvmanager.eu.auth0.com|443
    connect_timeout: 0.25s
    type: logical_dns
    lb_policy: round_robin
    dns_lookup_family: V4_ONLY
    load_assignment:
      cluster_name: kdvmanager.eu.auth0.com|443
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: kdvmanager.eu.auth0.com
                port_value: 443
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: kdvmanager.eu.auth0.com
  - name: otel-collector
    connect_timeout: 0.25s
    type: strict_dns
    lb_policy: round_robin
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: otel-collector
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: otel-collector.observability.svc.cluster.local
                port_value: 4317
  # OTLP/HTTP receiver of the same collector, for browser telemetry ingest.
  - name: otel-collector-http
    connect_timeout: 0.25s
    type: strict_dns
    lb_policy: round_robin
    load_assignment:
      cluster_name: otel-collector-http
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: otel-collector.observability.svc.cluster.local
                port_value: 4318
  - name: crm-api
    connect_timeout: 0.25s
    type: strict_dns
    lb_policy: round_robin
    load_assignment:
      cluster_name: crm-api
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: crm-api
                port_value: 8080
    health_checks:
    - timeout: 1s
      interval: 5s
      unhealthy_threshold: 2
      healthy_threshold: 1
      http_health_check:
        path: /healthz
        expected_statuses:
          - start: 200
            end: 299
    outlier_detection:
      consecutive_5xx: 3
      interval: 10s
      base_ejection_time: 30s
      max_ejection_percent: 50
  - name: scheduling-api
    connect_timeout: 0.25s
    type: strict_dns
    lb_policy: round_robin
    load_assignment:
      cluster_name: scheduling-api
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: scheduling-api
                port_value: 8080
    health_checks:
    - timeout: 1s
      interval: 5s
      unhealthy_threshold: 2
      healthy_threshold: 1
      http_health_check:
        path: /healthz
        expected_statuses:
          - start: 200
            end: 299
    outlier_detection:
      consecutive_5xx: 3
      interval: 10s
      base_ejection_time: 30s
      max_ejection_percent: 50
  - name: platformmanagement-api
    connect_timeout: 0.25s
    type: strict_dns
    lb_policy: round_robin
    load_assignment:
      cluster_name: platformmanagement-api
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: platformmanagement-api
                port_value: 8080
    health_checks:
    - timeout: 1s
      interval: 5s
      unhealthy_threshold: 2
      healthy_threshold: 1
      http_health_check:
        path: /healthz
        expected_statuses:
          - start: 200
            end: 299
    outlier_detection:
      consecutive_5xx: 3
      interval: 10s
      base_ejection_time: 30s
      max_ejection_percent: 50

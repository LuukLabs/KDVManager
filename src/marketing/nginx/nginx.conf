server {
  listen 80;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  # Conditional request / validation headers
  etag on;
  if_modified_since exact;

  # Compression
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/ttf font/otf font/woff font/woff2;
  gzip_disable "msie6";

  # Common security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Static marketing site: self + Google Fonts, inline styles/scripts used by the page
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

  location / {
    try_files $uri $uri/ =404;
  }

  # Long-lived caching for static assets (bust by filename when changed)
  location ~* \.(?:css|js|svg|woff2?|ttf|otf|png|jpg|jpeg|webp|avif|ico)$ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=2592000" always; # 30 days
  }

  # Always revalidate the HTML entry points
  location ~* \.html$ {
    add_header Cache-Control "no-cache" always;
  }

  # Deny access to hidden files (except .well-known for ACME)
  location ~ ^/(\.(?!well-known)) {
    return 404;
  }
}

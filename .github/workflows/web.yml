name: web

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - src/web/**
    - src/docker-compose.yml
    - .github/workflows/composite/**
    - .github/workflows/web.yml
  
  pull_request:
    branches:
    - main

    paths:
    - src/web/**
    - src/docker-compose.yml
    - .github/workflows/composite/**
    - .github/workflows/web.yml
env:
  REGISTRY: ghcr.io
  SERVICE: web
  IMAGE: web

jobs:

  CI:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./src/web

    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0
      with:
        fetch-depth: 0 

    - uses: pnpm/action-setup@v6.0.8
      with:
        version: 11.0.8

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'pnpm'
        cache-dependency-path: src/web/pnpm-lock.yaml

    - name: Install pnpm dependencies
      run: pnpm install --frozen-lockfile

    - name: Run ESLint
      run: pnpm eslint
    
    - name: Run typecheck
      run: pnpm run typecheck

  Test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./src/web

    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - uses: pnpm/action-setup@v6.0.8
      with:
        version: 11.0.8

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'pnpm'
        cache-dependency-path: src/web/pnpm-lock.yaml

    - name: Install pnpm dependencies
      run: pnpm install --frozen-lockfile

    # Cache the Playwright browser binary keyed on the playwright-core version
    # pinned in the lockfile so a fresh download only happens when Playwright
    # itself changes.
    - name: Resolve Playwright version
      id: pw-version
      run: |
        version=$(pnpm exec playwright --version | awk '{print $2}')
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      id: pw-cache
      uses: actions/cache@v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-chromium

    - name: Install Playwright Chromium
      if: steps.pw-cache.outputs.cache-hit != 'true'
      run: pnpm exec playwright install --with-deps chromium

    - name: Install Chromium system deps only
      if: steps.pw-cache.outputs.cache-hit == 'true'
      run: pnpm exec playwright install-deps chromium

    - name: Run tests with coverage
      env:
        CI: 'true'
      run: pnpm run test:ci

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: web-coverage
        path: src/web/coverage
        if-no-files-found: ignore
        retention-days: 14

    - name: Upload failure screenshots
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: web-test-screenshots
        path: src/web/**/__screenshots__/**
        if-no-files-found: ignore
        retention-days: 7

  BuildContainersForPR_Linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event_name == 'pull_request' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - uses: ./.github/workflows/composite/build
      with:
        service: ${{ env.SERVICE }}
        registry_endpoint: ${{ vars.REGISTRY_ENDPOINT }}

  BuildLinux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name != 'pull_request' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - uses: ./.github/workflows/composite/build-push
      with:
        service: ${{ env.SERVICE }}
        registry_host: ${{ env.REGISTRY }}
        registry_endpoint: ${{ vars.REGISTRY_ENDPOINT }}
        image_name: ${{ env.IMAGE }}
        registry_username: ${{ github.actor }}
        registry_password: ${{ secrets.GITHUB_TOKEN }}

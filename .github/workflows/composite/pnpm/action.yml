name: "Setup pnpm"
description: "Setup pnpm + node and install dependencies"

runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v6.0.8
      with:
        version: 11.0.8

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'
        cache: 'pnpm'

    - name: Install pnpm dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

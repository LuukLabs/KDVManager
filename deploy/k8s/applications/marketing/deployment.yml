apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: marketing
      release: production
  template:
    metadata:
      labels:
        app: marketing
        release: production
    spec:
      serviceAccountName: kdvmanager-sa
      containers:
      - name: marketing
        image: ghcr.io/luuklabs/kdvmanager/marketing:linux-main
        imagePullPolicy: Always
        ports:
          - name: http
            containerPort: 80
            protocol: TCP
        resources:
          # Static nginx site; minimal footprint
          requests:
            cpu: 20m
            memory: 20Mi
          limits:
            cpu: 100m
            memory: 64Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- deployment.yml
- service.yml

labels:
- pairs:
    app: platformmanagement-api
    component: api
    service: platformmanagement

images:
- name: ghcr.io/luuklabs/kdvmanager/platformmanagement.api

name: integration-tests

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - src/Services/**
    - src/Shared/**
    - tests/integration/**
    - .github/workflows/integration-tests.yml

  pull_request:
    branches:
    - main

    paths:
    - src/Services/**
    - src/Shared/**
    - tests/integration/**
    - .github/workflows/integration-tests.yml

permissions:
  contents: read
  packages: read

jobs:
  tenancy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 10.0.x

    - name: Add GitHub NuGet source
      run: dotnet nuget add source "https://nuget.pkg.github.com/LuukLabs/index.json" --name github --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text

    - name: Run tenancy integration tests
      run: dotnet test tests/integration/Tenancy.IntegrationTests/Tenancy.IntegrationTests.csproj --nologo

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz
  namespace: argocd
  labels:
    app.kubernetes.io/name: signoz
    app.kubernetes.io/part-of: observability-stack
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.signoz.io
    targetRevision: 0.88.2
    chart: signoz
    helm:
      values: |
        global:
          storageClass: do-block-storage

        # In chart 0.88.2 clickhouse and otelCollector are top-level keys, and
        # queryService/frontend/alertmanager are merged into the unified
        # `signoz` component.
        clickhouse:
          resources:
            requests:
              cpu: 300m
              memory: 640Mi
            limits:
              cpu: 800m
              memory: 1280Mi
          persistence:
            size: 5Gi
          # Per-query memory caps (ClickHouse user profile settings)
          profiles:
            default/max_memory_usage: "300000000"
            default/max_bytes_before_external_group_by: "200000000"
            default/max_bytes_before_external_sort: "200000000"
          # Server-wide memory caps; max_server_memory_usage replaces the
          # long-removed max_memory_usage_for_all_queries setting
          settings:
            max_server_memory_usage: "600000000"
            uncompressed_cache_size: "0"
            mark_cache_size: "268435456"

        signoz:
          ingress:
            enabled: true
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-production
            hosts:
              - host: signoz.kdvmanager.nl
                paths:
                  - path: /
                    pathType: ImplementationSpecific
                    port: 8080
            tls:
              - secretName: signoz-tls-cert
                hosts:
                  - signoz.kdvmanager.nl
          # Combined budget of the former queryService + frontend components
          resources:
            requests:
              cpu: 80m
              memory: 224Mi
            limits:
              cpu: 400m
              memory: 512Mi

        otelCollector:
          resources:
            requests:
              cpu: 80m
              memory: 192Mi
            limits:
              cpu: 400m
              memory: 512Mi
          config:
            processors:
              batch:
                send_batch_size: 256
                timeout: 5s
                send_batch_max_size: 512
  destination:
    server: https://kubernetes.default.svc
    namespace: signoz
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10

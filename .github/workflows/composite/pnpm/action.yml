name: "Setup pnpm"
description: "Setup pnpm + node and install dependencies"

runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v6.0.9
      with:
        version: 11.0.8

    - name: Setup Node
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '26.x'
        cache: 'pnpm'

    - name: Install pnpm dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

name: update-kustomize-images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/web/**'
      - 'src/Services/CRM/**'
      - 'src/Services/PlatformManagement/**'
      - 'src/Services/Scheduling/**'
      - 'src/Shared/**'
      - 'src/docker-compose.yml'
      - '.github/workflows/web.yml'
      - '.github/workflows/crm-api.yml'
      - '.github/workflows/crm-migrator.yml'
      - '.github/workflows/platformmanagement-api.yml'
      - '.github/workflows/platformmanagement-migrator.yml'
      - '.github/workflows/scheduling-api.yml'
      - '.github/workflows/scheduling-migrator.yml'
      - '.github/workflows/composite/**'
      - '.github/workflows/deploy-update-images.yml'

permissions:
  contents: write
  pull-requests: write
  packages: read

env:
  REGISTRY: ghcr.io/luuklabs/kdvmanager

jobs:
  update-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Install kustomize
        run: |
          curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Seed from existing automation PR branch
        run: |
          # peter-evans/create-pull-request rebuilds the PR branch from the base
          # (main) plus the current working-tree diff on every run. Combined with
          # CHANGED_ONLY, that drops tag bumps for services queued in a previous,
          # not-yet-merged run. Restore the kustomization files from the automation
          # branch first so those pending updates are carried forward, then this
          # run's changed services are applied on top.
          if git ls-remote --exit-code --heads origin automation-update-images >/dev/null 2>&1; then
            echo "Automation branch exists; seeding kustomization tags to preserve pending (unmerged) updates"
            git fetch --depth=1 origin automation-update-images
            git checkout FETCH_HEAD -- deploy/k8s/applications/*/kustomization.yaml
          else
            echo "No existing automation branch; starting from ${GITHUB_REF_NAME:-main}"
          fi

      - name: Update kustomize image tags (changed services)
        env:
          CHANGED_ONLY: true
          BASE_SHA: ${{ github.event.before }}
        run: |
          bash scripts/update-kustomize-images.sh

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet deploy/k8s/applications; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create / Update PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation-update-images
          commit-message: "chore(kustomize): update image tags to linux-${{ github.sha }}"
          title: "chore(kustomize): update image tags"
          body: |
            Automated update of kustomize image tags.
            Head SHA: `${{ github.sha }}`
            This PR is maintained as a rolling branch (automation-update-images) to avoid path conflicts with historical per-SHA branches.
          labels: automation,images,kustomize
          add-paths: |
            deploy/k8s/applications/*/kustomization.yaml
          signoff: false

      - name: Summary
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "PR created/updated (branch automation-update-images)." >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes detected; no PR action." >> $GITHUB_STEP_SUMMARY
          fi
